#    ports:
#      - "3000:3000"
#    depends_on:
#      db:
#        condition: service_healthy

  # Optional but recommended: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: ceres_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ceres.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  ceres_pgdata: